services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: schoolsys_api_app
    working_dir: /var/www
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
    networks:
      - app-network
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: schoolsys_api_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - app-network

  adminer:
    image: adminer
    container_name: schoolsys_api_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - app-network

volumes:
  dbdata:

networks:
  app-network:
    driver: bridge
